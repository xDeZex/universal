apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello
  namespace: services
spec:
  rules:
    - host: xdezex.duckdns.org
      http:
        paths:
          - path: /hello
            pathType: Prefix
            backend:
              service:
                name: hello
                port:
                  number: 8080
