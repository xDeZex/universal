apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: services
  labels:
    app: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          image: ghcr.io/xdezex/universal/hello:dev
          envFrom:
            - configMapRef:
                name: hello-otel-config
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
