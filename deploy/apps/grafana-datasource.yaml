apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-datasource
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/xDeZex/universal
    targetRevision: main
    path: deploy/observability-config/grafana-datasource
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
