apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.14.0
    helm:
      values: |
        alertmanager:
          enabled: false
        prometheus-node-exporter:
          enabled: false
        kube-state-metrics:
          enabled: false
        prometheus-pushgateway:
          enabled: false

        serverFiles:
          alerting_rules.yml:
            groups:
              - name: hello
                rules:
                  - alert: HelloNon2xxResponses
                    expr: increase(http_server_request_duration_seconds_count{job="hello",http_response_status_code!~"2.."}[5m]) > 0
                    for: 0m
                    labels:
                      severity: warning
                    annotations:
                      summary: hello is returning non-2xx responses

        server:
          retention: 7d
          extraArgs:
            web.enable-remote-write-receiver: null
          persistentVolume:
            storageClass: observability-retain
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
