name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.changes.outputs.infra }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
      id: changes
      with:
        filters: |
          infra:
            - 'deploy/**'
            - '.github/workflows/ci.yml'
            - '.yamllint.yml'

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test --concurrency=4 --reporter=compact

    - name: Run Flutter analyze
      run: flutter analyze

  lint-deploy:
    needs: filter
    if: needs.filter.outputs.infra == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install yamllint
      run: pip install yamllint==1.38.0

    - name: Install kustomize
      run: |
        curl -sLo kustomize.tar.gz \
          https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
        echo "3669470b454d865c8184d6bce78df05e977c9aea31c30df3c669317d43bcc7a7  kustomize.tar.gz" | sha256sum --check
        tar -xzf kustomize.tar.gz
        sudo mv kustomize /usr/local/bin/kustomize
        kustomize version

    - name: Install kubeconform
      run: |
        curl -sLo kubeconform.tar.gz \
          https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
        echo "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73  kubeconform.tar.gz" | sha256sum --check
        tar -xzf kubeconform.tar.gz
        sudo mv kubeconform /usr/local/bin/kubeconform
        kubeconform -v

    - name: Lint YAML (yamllint)
      run: yamllint deploy/ .yamllint.yml .github/

    - name: Validate Kubernetes schemas (kubeconform)
      run: |
        set -eo pipefail
        kustomize build deploy/bootstrap > /tmp/bootstrap.yaml
        [ -s /tmp/bootstrap.yaml ] || { echo "ERROR: kustomize produced empty output"; exit 1; }
        kubeconform \
          -strict \
          -skip CustomResourceDefinition \
          -output json \
          -verbose \
          -schema-location default \
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/1de95b7e9cb737ba46b14fa5a033fee2e47d90a3/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
          /tmp/bootstrap.yaml > /tmp/kubeconform.json
        python3 -c "
        import sys, json
        with open('/tmp/kubeconform.json') as f:
            records = json.load(f).get('resources', [])
        bad = [r for r in records if r.get('status') not in ('statusValid', 'statusSkipped')]
        if bad:
            print('ERROR: non-valid resources:')
            for r in bad: print(f'  {r[\"status\"]} {r.get(\"apiVersion\",\"\")} {r.get(\"kind\",\"\")}/{r.get(\"name\",\"?\")}')
            sys.exit(1)
        valid = [r for r in records if r.get('status') == 'statusValid']
        print(f'kubeconform: {len(valid)} resources validated')
        "

  build-and-release:
    needs: [test, lint-deploy]
    if: |
      github.event_name == 'push' &&
      needs.test.result == 'success' &&
      (needs.lint-deploy.result == 'success' || needs.lint-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Rename APK
      run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Universal.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Universal-apk
        path: build/app/outputs/flutter-apk/Universal.apk
        retention-days: 30

    - name: Get commit info
      id: commit
      run: |
        echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "message=$(git log --format=%B -n 1 HEAD | head -1)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

    - name: Write release body
      env:
        COMMIT_MSG: ${{ steps.commit.outputs.message }}
        COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        BRANCH: ${{ github.ref_name }}
        BUILD_TIME: ${{ steps.commit.outputs.timestamp }}
      run: |
        printf '## Automated Build\n%s\n\n## Download\n- **APK**: Universal.apk\n\n**Commit**: %s\n**Branch**: %s\n**Build Time**: %s\n' \
          "$COMMIT_MSG" "$COMMIT_SHA" "$BRANCH" "$BUILD_TIME" > release_body.md

    - name: Create release
      uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77
      with:
        files: build/app/outputs/flutter-apk/Universal.apk
        tag_name: "build-${{ steps.commit.outputs.timestamp }}-${{ steps.commit.outputs.sha }}"
        name: "Build ${{ steps.commit.outputs.timestamp }}"
        body_path: release_body.md
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
