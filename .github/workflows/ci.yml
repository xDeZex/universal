name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.changes.outputs.deploy }}
      services: ${{ steps.changes.outputs.services }}
      hello: ${{ steps.changes.outputs.hello }}
      app: ${{ steps.changes.outputs.app }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3
      id: changes
      with:
        filters: |
          deploy:
            - 'deploy/**'
            - '.github/workflows/ci.yml'
            - '.yamllint.yml'
          services:
            - 'services/**'
          hello:
            - 'services/hello/**'
          app:
            - 'app/**'
            - '.github/workflows/ci.yml'

  test:
    needs: filter
    if: needs.filter.outputs.app == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: app/.flutter-version
        cache: true

    - name: Get Flutter dependencies
      working-directory: app
      run: flutter pub get

    - name: Run tests
      working-directory: app
      run: flutter test --concurrency=4 --reporter=compact

    - name: Run Flutter analyze
      working-directory: app
      run: flutter analyze

  test-hello:
    needs: filter
    if: needs.filter.outputs.services == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: services/hello/go.mod

    - name: Run tests
      working-directory: services/hello
      run: go test ./...

    - name: Run go vet
      working-directory: services/hello
      run: go vet ./...

  lint-deploy:
    needs: filter
    if: needs.filter.outputs.deploy == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install yamllint
      run: pip install yamllint==1.38.0

    - name: Install kustomize
      uses: ./.github/actions/setup-kustomize

    - name: Install kubeconform
      run: |
        curl -sLo kubeconform.tar.gz \
          https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
        echo "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73  kubeconform.tar.gz" | sha256sum --check
        tar -xzf kubeconform.tar.gz
        sudo mv kubeconform /usr/local/bin/kubeconform
        kubeconform -v

    - name: Lint YAML (yamllint)
      run: yamllint deploy/ .yamllint.yml .github/

    - name: Validate Kubernetes schemas (kubeconform)
      run: |
        set -eo pipefail
        > /tmp/manifests.yaml
        for dir in deploy/bootstrap deploy/services/hello deploy/infra/sealed-secrets deploy/infra/duckdns-updater; do
          kustomize build "$dir" > /tmp/build.yaml
          [ -s /tmp/build.yaml ] || { echo "ERROR: kustomize produced empty output for $dir"; exit 1; }
          cat /tmp/build.yaml >> /tmp/manifests.yaml
          echo "---" >> /tmp/manifests.yaml
        done
        for f in deploy/apps/*.yaml; do
          [ -e "$f" ] || continue
          cat "$f" >> /tmp/manifests.yaml
          echo "---" >> /tmp/manifests.yaml
        done
        kubeconform \
          -strict \
          -skip CustomResourceDefinition \
          -output json \
          -verbose \
          -schema-location default \
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/1de95b7e9cb737ba46b14fa5a033fee2e47d90a3/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
          /tmp/manifests.yaml > /tmp/kubeconform.json
        python3 -c "
        import sys, json
        with open('/tmp/kubeconform.json') as f:
            records = json.load(f).get('resources', [])
        bad = [r for r in records if r.get('status') not in ('statusValid', 'statusSkipped')]
        if bad:
            print('ERROR: non-valid resources:')
            for r in bad: print(f'  {r[\"status\"]} {r.get(\"apiVersion\",\"\")} {r.get(\"kind\",\"\")}/{r.get(\"name\",\"?\")}')
            sys.exit(1)
        valid = [r for r in records if r.get('status') == 'statusValid']
        print(f'kubeconform: {len(valid)} resources validated')
        "

  build-push-hello:
    needs: [filter, test-hello, lint-deploy]
    if: |
      github.event_name == 'push' &&
      needs.filter.outputs.hello == 'true' &&
      needs.test-hello.result == 'success' &&
      (needs.lint-deploy.result == 'success' || needs.lint-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.commit.outputs.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get short SHA
      id: commit
      run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push hello image
      uses: docker/build-push-action@v7
      with:
        context: services/hello
        platforms: linux/amd64
        push: true
        tags: ghcr.io/xdezex/universal/hello:${{ steps.commit.outputs.sha }}
        build-args: |
          VERSION=${{ steps.commit.outputs.sha }}

  deploy-hello:
    needs: [filter, build-push-hello]
    if: |
      github.event_name == 'push' &&
      needs.filter.outputs.hello == 'true' &&
      needs.build-push-hello.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.DEPLOY_TOKEN }}

    - name: Install kustomize
      uses: ./.github/actions/setup-kustomize

    - name: Bump hello image tag
      working-directory: deploy/services/hello
      env:
        SHA: ${{ needs.build-push-hello.outputs.sha }}
      run: kustomize edit set image "ghcr.io/xdezex/universal/hello=ghcr.io/xdezex/universal/hello:${SHA}"

    - name: Commit and push deploy commit
      env:
        SHA: ${{ needs.build-push-hello.outputs.sha }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add deploy/services/hello/kustomization.yaml
        git commit -m "deploy: hello@${SHA}"
        git push

  build-and-release:
    needs: [test, lint-deploy]
    if: |
      github.event_name == 'push' &&
      needs.test.result == 'success' &&
      (needs.lint-deploy.result == 'success' || needs.lint-deploy.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: app/.flutter-version
        cache: true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Get Flutter dependencies
      working-directory: app
      run: flutter pub get

    - name: Build APK
      working-directory: app
      run: flutter build apk --release

    - name: Rename APK
      run: mv app/build/app/outputs/flutter-apk/app-release.apk app/build/app/outputs/flutter-apk/Universal.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Universal-apk
        path: app/build/app/outputs/flutter-apk/Universal.apk
        retention-days: 30

    - name: Get commit info
      id: commit
      run: |
        echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "message=$(git log --format=%B -n 1 HEAD | head -1)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

    - name: Write release body
      env:
        COMMIT_MSG: ${{ steps.commit.outputs.message }}
        COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        BRANCH: ${{ github.ref_name }}
        BUILD_TIME: ${{ steps.commit.outputs.timestamp }}
      run: |
        printf '## Automated Build\n%s\n\n## Download\n- **APK**: Universal.apk\n\n**Commit**: %s\n**Branch**: %s\n**Build Time**: %s\n' \
          "$COMMIT_MSG" "$COMMIT_SHA" "$BRANCH" "$BUILD_TIME" > release_body.md

    - name: Create release
      uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77
      with:
        files: app/build/app/outputs/flutter-apk/Universal.apk
        tag_name: "build-${{ steps.commit.outputs.timestamp }}-${{ steps.commit.outputs.sha }}"
        name: "Build ${{ steps.commit.outputs.timestamp }}"
        body_path: release_body.md
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
