name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test --concurrency=4 --reporter=compact

    - name: Run Flutter analyze
      run: flutter analyze

  build-and-release:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Get Flutter dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Rename APK
      run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Universal.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Universal-apk
        path: build/app/outputs/flutter-apk/Universal.apk
        retention-days: 30

    - name: Get commit info
      id: commit
      run: |
        echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "message=$(git log --format=%B -n 1 HEAD | head -1)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

    - name: Write release body
      env:
        COMMIT_MSG: ${{ steps.commit.outputs.message }}
        COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        BRANCH: ${{ github.ref_name }}
        BUILD_TIME: ${{ steps.commit.outputs.timestamp }}
      run: |
        printf '## Automated Build\n%s\n\n## Download\n- **APK**: Universal.apk\n\n**Commit**: %s\n**Branch**: %s\n**Build Time**: %s\n' \
          "$COMMIT_MSG" "$COMMIT_SHA" "$BRANCH" "$BUILD_TIME" > release_body.md

    - name: Create release
      uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77
      with:
        files: build/app/outputs/flutter-apk/Universal.apk
        tag_name: "build-${{ steps.commit.outputs.timestamp }}-${{ steps.commit.outputs.sha }}"
        name: "Build ${{ steps.commit.outputs.timestamp }}"
        body_path: release_body.md
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
