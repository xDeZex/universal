name: CI Universal

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      universal: ${{ steps.filter.outputs.universal }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for universal changes
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          universal:
            - 'universal/**'
            - '.github/workflows/ci-universal.yml'

  test-universal:
    needs: changes
    if: needs.changes.outputs.universal == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: universal/.flutter-version
        cache: true

    - name: Cache pub packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ runner.os }}-${{ hashFiles('universal/pubspec.lock') }}
        restore-keys: |
          pub-${{ runner.os }}-

    - name: Get Flutter dependencies
      working-directory: universal
      run: flutter pub get

    - name: Run tests
      working-directory: universal
      run: flutter test --concurrency=4 --reporter=compact

    - name: Run Flutter analyze
      working-directory: universal
      run: flutter analyze

  build-universal:
    needs: changes
    if: needs.changes.outputs.universal == 'true'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
      timestamp: ${{ steps.commit.outputs.timestamp }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version-file: universal/.flutter-version
        cache: true

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}-

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Cache pub packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ runner.os }}-${{ hashFiles('universal/pubspec.lock') }}
        restore-keys: |
          pub-${{ runner.os }}-

    - name: Get Flutter dependencies
      working-directory: universal
      run: flutter pub get

    - name: Get commit info
      id: commit
      run: |
        echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

    - name: Build APK
      working-directory: universal
      run: flutter build apk --release --dart-define=BUILD_TAG=build-${{ steps.commit.outputs.timestamp }}-${{ steps.commit.outputs.sha }}

    - name: Rename APK
      run: mv universal/build/app/outputs/flutter-apk/app-release.apk universal/build/app/outputs/flutter-apk/Universal.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Universal-apk
        path: universal/build/app/outputs/flutter-apk/Universal.apk
        retention-days: 30

  release-universal:
    needs: [build-universal, test-universal]
    if: |
      github.event_name == 'push' &&
      needs.build-universal.result == 'success' &&
      needs.test-universal.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: Universal-apk
        path: universal/build/app/outputs/flutter-apk

    - name: Compute APK checksum
      working-directory: universal/build/app/outputs/flutter-apk
      run: sha256sum Universal.apk > Universal.apk.sha256

    - name: Write release body
      env:
        COMMIT_SHA: ${{ needs.build-universal.outputs.sha }}
        BRANCH: ${{ github.ref_name }}
        BUILD_TIME: ${{ needs.build-universal.outputs.timestamp }}
      run: |
        printf '## Automated Build\n\n## Download\n- **APK**: Universal.apk\n\n**Commit**: %s\n**Branch**: %s\n**Build Time**: %s\n' \
          "$COMMIT_SHA" "$BRANCH" "$BUILD_TIME" > release_body.md

    - name: Create release
      uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77
      with:
        files: |
          universal/build/app/outputs/flutter-apk/Universal.apk
          universal/build/app/outputs/flutter-apk/Universal.apk.sha256
        tag_name: "build-${{ needs.build-universal.outputs.timestamp }}-${{ needs.build-universal.outputs.sha }}"
        name: "Build ${{ needs.build-universal.outputs.timestamp }}"
        body_path: release_body.md
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
