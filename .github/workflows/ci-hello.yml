name: CI Hello

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      hello: ${{ steps.filter.outputs.hello }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for hello changes
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          hello:
            - 'services/hello/**'
            - 'deploy/services/hello/**'
            - '.github/workflows/ci-hello.yml'

  test-hello:
    needs: changes
    if: needs.changes.outputs.hello == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: services/hello/go.mod

    - name: Run tests
      working-directory: services/hello
      run: go test ./...

    - name: Run go vet
      working-directory: services/hello
      run: go vet ./...

  build-hello:
    needs: changes
    if: needs.changes.outputs.hello == 'true'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.commit.outputs.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get short SHA
      id: commit
      run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build hello image
      uses: docker/build-push-action@v7
      with:
        context: services/hello
        platforms: linux/amd64
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ steps.commit.outputs.sha }}

  validate-hello-manifests:
    needs: changes
    if: needs.changes.outputs.hello == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install kustomize
      uses: ./.github/actions/setup-kustomize

    - name: Install kubeconform
      run: |
        curl -sLo kubeconform.tar.gz \
          https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
        echo "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73  kubeconform.tar.gz" | sha256sum --check
        tar -xzf kubeconform.tar.gz
        sudo mv kubeconform /usr/local/bin/kubeconform
        kubeconform -v

    - name: Validate hello manifests (kubeconform)
      run: |
        set -eo pipefail
        kustomize build deploy/services/hello > /tmp/manifests.yaml
        [ -s /tmp/manifests.yaml ] || { echo "ERROR: kustomize produced empty output for deploy/services/hello"; exit 1; }
        kubeconform \
          -strict \
          -skip CustomResourceDefinition \
          -output json \
          -verbose \
          -schema-location default \
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/1de95b7e9cb737ba46b14fa5a033fee2e47d90a3/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
          /tmp/manifests.yaml > /tmp/kubeconform.json
        python3 -c "
        import sys, json
        with open('/tmp/kubeconform.json') as f:
            records = json.load(f).get('resources', [])
        bad = [r for r in records if r.get('status') not in ('statusValid', 'statusSkipped')]
        if bad:
            print('ERROR: non-valid resources:')
            for r in bad: print(f'  {r[\"status\"]} {r.get(\"apiVersion\",\"\")} {r.get(\"kind\",\"\")}/{r.get(\"name\",\"?\")}')
            sys.exit(1)
        valid = [r for r in records if r.get('status') == 'statusValid']
        print(f'kubeconform: {len(valid)} resources validated')
        "

  push-hello:
    needs: [test-hello, build-hello]
    if: |
      github.event_name == 'push' &&
      needs.test-hello.result == 'success' &&
      needs.build-hello.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ needs.build-hello.outputs.sha }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push hello image
      uses: docker/build-push-action@v7
      with:
        context: services/hello
        platforms: linux/amd64
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
        tags: ghcr.io/xdezex/universal/hello:${{ needs.build-hello.outputs.sha }}
        build-args: |
          VERSION=${{ needs.build-hello.outputs.sha }}

  deploy-hello:
    needs: [push-hello, validate-hello-manifests]
    if: |
      github.event_name == 'push' &&
      needs.push-hello.result == 'success' &&
      needs.validate-hello-manifests.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.DEPLOY_TOKEN }}

    - name: Install kustomize
      uses: ./.github/actions/setup-kustomize

    - name: Bump hello image tag
      working-directory: deploy/services/hello
      env:
        SHA: ${{ needs.push-hello.outputs.sha }}
      run: kustomize edit set image "ghcr.io/xdezex/universal/hello=ghcr.io/xdezex/universal/hello:${SHA}"

    - name: Commit and push deploy commit
      env:
        SHA: ${{ needs.push-hello.outputs.sha }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add deploy/services/hello/kustomization.yaml
        git commit -m "deploy: hello@${SHA} [skip ci]"
        git push
