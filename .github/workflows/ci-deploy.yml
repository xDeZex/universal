name: CI Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.combine.outputs.deploy }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Own filter step with 'every' quantifier: a changed file only counts
    # toward 'deploy_excl_hello' if it matches 'deploy/**' AND does not match
    # 'deploy/services/hello/**' (owned by ci-hello.yml's own validation).
    - name: Check for deploy changes (excluding hello)
      uses: dorny/paths-filter@v3
      id: deploy-core
      with:
        predicate-quantifier: every
        filters: |
          deploy_excl_hello:
            - 'deploy/**'
            - '!deploy/services/hello/**'

    - name: Check for deploy meta changes
      uses: dorny/paths-filter@v3
      id: deploy-meta
      with:
        filters: |
          meta:
            - '.yamllint.yml'
            - '.github/workflows/ci-deploy.yml'

    - name: Combine deploy filters
      id: combine
      run: |
        if [[ "${{ steps.deploy-core.outputs.deploy_excl_hello }}" == "true" || "${{ steps.deploy-meta.outputs.meta }}" == "true" ]]; then
          echo "deploy=true" >> "$GITHUB_OUTPUT"
        else
          echo "deploy=false" >> "$GITHUB_OUTPUT"
        fi

  lint-deploy:
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install yamllint
      run: pip install yamllint==1.38.0

    - name: Install kustomize
      uses: ./.github/actions/setup-kustomize

    - name: Install kubeconform
      run: |
        curl -sLo kubeconform.tar.gz \
          https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
        echo "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73  kubeconform.tar.gz" | sha256sum --check
        tar -xzf kubeconform.tar.gz
        sudo mv kubeconform /usr/local/bin/kubeconform
        kubeconform -v

    - name: Lint YAML (yamllint)
      run: yamllint deploy/ .yamllint.yml .github/

    - name: Validate Kubernetes schemas (kubeconform)
      run: |
        set -eo pipefail
        > /tmp/manifests.yaml
        for dir in deploy/bootstrap deploy/infra/sealed-secrets deploy/infra/duckdns-updater; do
          kustomize build "$dir" > /tmp/build.yaml
          [ -s /tmp/build.yaml ] || { echo "ERROR: kustomize produced empty output for $dir"; exit 1; }
          cat /tmp/build.yaml >> /tmp/manifests.yaml
          echo "---" >> /tmp/manifests.yaml
        done
        for f in deploy/apps/*.yaml; do
          [ -e "$f" ] || continue
          cat "$f" >> /tmp/manifests.yaml
          echo "---" >> /tmp/manifests.yaml
        done
        kubeconform \
          -strict \
          -skip CustomResourceDefinition \
          -output json \
          -verbose \
          -schema-location default \
          -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/1de95b7e9cb737ba46b14fa5a033fee2e47d90a3/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
          /tmp/manifests.yaml > /tmp/kubeconform.json
        python3 -c "
        import sys, json
        with open('/tmp/kubeconform.json') as f:
            records = json.load(f).get('resources', [])
        bad = [r for r in records if r.get('status') not in ('statusValid', 'statusSkipped')]
        if bad:
            print('ERROR: non-valid resources:')
            for r in bad: print(f'  {r[\"status\"]} {r.get(\"apiVersion\",\"\")} {r.get(\"kind\",\"\")}/{r.get(\"name\",\"?\")}')
            sys.exit(1)
        valid = [r for r in records if r.get('status') == 'statusValid']
        print(f'kubeconform: {len(valid)} resources validated')
        "
