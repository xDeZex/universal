name: Setup kustomize
description: Download and install a pinned, checksum-verified kustomize release

runs:
  using: composite
  steps:
  - name: Install kustomize
    shell: bash
    run: |
      curl -sLo kustomize.tar.gz \
        https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
      echo "3669470b454d865c8184d6bce78df05e977c9aea31c30df3c669317d43bcc7a7  kustomize.tar.gz" | sha256sum --check
      tar -xzf kustomize.tar.gz
      sudo mv kustomize /usr/local/bin/kustomize
      kustomize version
