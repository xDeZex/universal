---
extends: default

ignore: |
  **/argocd-install.yaml
  **/sealedsecret.yaml

rules:
  document-start: disable
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  line-length:
    max: 200
  indentation:
    spaces: 2
    indent-sequences: whatever
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
